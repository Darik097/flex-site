proxy_cache_path /var/cache/nginx/flex_static levels=1:2 keys_zone=flex_static:32m max_size=512m inactive=30d use_temp_path=off;

server {
    listen 80;
    listen [::]:80;
    server_name flexpro02.ru www.flexpro02.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://flexpro02.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.flexpro02.ru;

    ssl_certificate /etc/letsencrypt/live/flexpro02.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flexpro02.ru/privkey.pem;

    return 301 https://flexpro02.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name flexpro02.ru;

    ssl_certificate /etc/letsencrypt/live/flexpro02.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flexpro02.ru/privkey.pem;

    client_max_body_size 10m;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    location /static/ {
        proxy_pass http://127.0.0.1:18778;
        proxy_http_version 1.1;
        proxy_buffering on;
        proxy_cache flex_static;
        proxy_cache_lock on;
        proxy_cache_valid 200 206 30d;
        proxy_cache_valid 404 1m;
        proxy_ignore_headers Set-Cookie;
        proxy_hide_header Set-Cookie;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location / {
        proxy_pass http://127.0.0.1:18778;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
