server {
    listen 80;
    listen [::]:80;
    server_name flexpro02.ru www.flexpro02.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://flexpro02.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.flexpro02.ru;

    ssl_certificate /etc/letsencrypt/live/flexpro02.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flexpro02.ru/privkey.pem;

    return 301 https://flexpro02.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name flexpro02.ru;

    ssl_certificate /etc/letsencrypt/live/flexpro02.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flexpro02.ru/privkey.pem;

    client_max_body_size 10m;

    location /static/ {
        proxy_pass http://127.0.0.1:18778;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:18778;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
