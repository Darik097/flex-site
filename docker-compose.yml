services:
  web:
    build: .
    container_name: flex-site
    restart: unless-stopped
    ports:
      - "18778:8000"
    environment:
      PORT: 8000
      FLASK_DEBUG: 0
      SITE_URL: ${SITE_URL:-https://flexpro02.ru}
      STATS_DB_PATH: /app/data/analytics.sqlite3
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TELEGRAM_DISABLE_SSL_VERIFY: ${TELEGRAM_DISABLE_SSL_VERIFY:-0}
      STATS_REPORT_TIME: ${STATS_REPORT_TIME:-21:00}
      STATS_REPORT_TZ: ${STATS_REPORT_TZ:-Europe/Moscow}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-6}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      GUNICORN_MAX_REQUESTS: ${GUNICORN_MAX_REQUESTS:-1000}
      GUNICORN_MAX_REQUESTS_JITTER: ${GUNICORN_MAX_REQUESTS_JITTER:-100}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
